name: Browser Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build RPM
        run: make rpm

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: bin/rpm/flightctl-onboarding-*.noarch.rpm

  integration-tests:
    name: "${{ matrix.os }} integration tests"
    needs: [build-rpm]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [fedora-43, centos-9-stream, centos-10]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-kvm libvirt-daemon-system libvirt-clients virtinst ovmf \
            swtpm swtpm-tools python3-libvirt python3-gssapi python3-pil \
            python3-aiohttp make rpm python-is-python3

      - name: Set up Chromium + chromedriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Wire up browser binaries for testlib
        run: |
          sudo ln -sf "${{ steps.setup-chrome.outputs.chrome-path }}" /usr/bin/chromium-browser
          echo "$(dirname '${{ steps.setup-chrome.outputs.chromedriver-path }}')" >> "$GITHUB_PATH"

      - name: Restore cached base image
        id: restore-image-cache
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/cockpit-images
          key: cockpit-images-${{ matrix.os }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            cockpit-images-${{ matrix.os }}-

      - name: Restore cached Fedora base image (for service VMs)
        if: matrix.os != 'fedora-43'
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/cockpit-images
          key: cockpit-images-fedora-43-${{ hashFiles('Makefile') }}
          restore-keys: |
            cockpit-images-fedora-43-

      - name: Download RPM
        uses: actions/download-artifact@v4
        with:
          name: rpm
          path: bin/rpm/

      - name: Build VM images
        run: |
          make vm-services
          make vm-network-services
          make vm-agent
        env:
          PYTHONUNBUFFERED: 1
          TEST_OS: ${{ matrix.os }}

      - name: Save base image cache
        if: github.ref == 'refs/heads/main' && steps.restore-image-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.cache/cockpit-images
          key: cockpit-images-${{ matrix.os }}-${{ hashFiles('Makefile') }}

      - name: Run integration tests
        run: make check-integration
        env:
          PYTHONUNBUFFERED: 1
          TEST_OS: ${{ matrix.os }}
          TEST_MEMORY_MB: 2048
          TEST_CPUS: 2
          RUN_TESTS_OPTIONS: -v

      - name: Upload test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures-${{ matrix.os }}
          path: |
            Test*.png
            Test*.html
            Test*.log.gz
          if-no-files-found: ignore
